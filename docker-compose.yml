

services:
  
  backend-dev:
    container_name: poker-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=pokeruser
      - DB_PASSWORD=pokerpass
      - DB_NAME=pokerdb
    depends_on:
      - postgres
    command: npm run start:dev

  backend-prod:
    container_name: poker-backend-prod
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=pokeruser
      - DB_PASSWORD=pokerpass
      - DB_NAME=pokerdb
    depends_on:
      - postgres
    restart: unless-stopped

  frontend-dev:
    container_name: poker-frontend-dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run start

  frontend-prod:
    container_name: poker-frontend-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    restart: unless-stopped

  postgres:
    image: postgres:14
    container_name: poker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pokeruser
      POSTGRES_PASSWORD: pokerpass
      POSTGRES_DB: pokerdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

volumes:
  postgres-data: