<mat-toolbar color="primary" class="toolbar">
  <!-- Logo ou titre -->
  <span class="app-title" (click)="redirectHome()">🃏 Poker Game</span>

  <!-- Icône de menu visible en mobile -->
  <button
    mat-icon-button
    class="mobile-toggle"
    (click)="toggleMenu()"
    aria-label="Ouvrir le menu"
  >
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Menu principal desktop -->
  <div class="menu-desktop">
    <ng-container *ngIf="session.isAuthenticated; else notConnected">
      <button mat-button color="accent" (click)="logout()">Déconnexion</button>
    </ng-container>

    <ng-template #notConnected>
      <button mat-button color="accent" (click)="redirectLogin()">Connexion</button>
      <button mat-button color="warn" (click)="redirectRegister()">Inscription</button>
    </ng-template>
  </div>
</mat-toolbar>

<!-- Menu mobile déroulant -->
<div class="menu-mobile" *ngIf="menuOpen">
  <ng-container *ngIf="session.isAuthenticated; else mobileNotConnected">
    <button mat-button (click)="logout()">Déconnexion</button>
  </ng-container>

  <ng-template #mobileNotConnected>
    <button mat-button (click)="redirectLogin()">Connexion</button>
    <button mat-button (click)="redirectRegister()">Inscription</button>
  </ng-template>
</div>
